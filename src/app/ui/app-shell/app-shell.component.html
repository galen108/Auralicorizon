<!-- Skip navigation — first focusable element on the page -->
<a class="skip-link" href="#main-content">Skip to main content</a>

<mat-sidenav-container class="shell-container">

  <mat-sidenav
    #sidenav
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="!isMobile()"
    class="shell-sidenav"
    aria-label="Main navigation"
  >
    <a routerLink="/" class="sidenav-brand" aria-label="Auralicorizon home">
      <img src="assets/Auralicorizon.png" alt="" aria-hidden="true" class="brand-logo" />
      <div class="brand-text">
        <span class="brand-name">AURALICORIZON</span>
        <span class="brand-sub">CIVILIZATIONAL CODEX</span>
      </div>
    </a>

    <div class="nav-label" aria-hidden="true">ENGINES</div>
    <mat-nav-list aria-label="Analytical engines">
      @for (engine of registry.engines; track engine.id) {
        <a
          mat-list-item
          [routerLink]="engine.route"
          routerLinkActive="nav-active"
          #rla="routerLinkActive"
          [attr.aria-current]="rla.isActive ? 'page' : null"
          class="nav-item"
          (click)="closeSidenavIfMobile()"
        >
          <mat-icon matListItemIcon aria-hidden="true">{{ engineIcons[engine.id] }}</mat-icon>
          <span matListItemTitle>{{ engine.label }}</span>
          <span matListItemLine class="nav-item-desc">{{ engine.description }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidenav-footer" role="contentinfo">
      <span class="footer-label">HYBRID SYNTHESIS SYSTEM</span>
      <span class="footer-version">v0.1.0 · 6000 BCE – 2100 CE</span>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="shell-content">
    <header>
      <mat-toolbar class="shell-toolbar">
        <button mat-icon-button class="menu-btn" (click)="sidenav.toggle()" aria-label="Toggle navigation menu" aria-controls="sidenav">
          <mat-icon aria-hidden="true">menu</mat-icon>
        </button>
        <img src="assets/Auralicorizon.png" alt="" aria-hidden="true" class="toolbar-logo" />
        <span class="toolbar-title" aria-hidden="true">AURALICORIZON</span>
        <span class="toolbar-divider" aria-hidden="true">|</span>
        <span class="toolbar-sub" aria-hidden="true">CIVILIZATIONAL ARCHITECTURE CODEX</span>
        <span class="toolbar-spacer"></span>
        <button
          mat-icon-button
          class="theme-btn"
          (click)="toggleTheme()"
          [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
          [attr.aria-pressed]="!isDark()"
        >
          <mat-icon aria-hidden="true">{{ isDark() ? 'wb_sunny' : 'nights_stay' }}</mat-icon>
        </button>
      </mat-toolbar>
    </header>

    <main id="main-content" class="shell-main" tabindex="-1">
      <router-outlet />
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
