<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Auralicorizon</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <!-- Set theme before CSS loads to prevent flash of wrong theme -->
  <script>
    document.documentElement.setAttribute(
      'data-theme',
      localStorage.getItem('theme') || 'dark'
    );
  </script>
  <!-- SPA redirect restore for GitHub Pages -->
  <script>
    (function () {
      var redirect = sessionStorage.getItem('spa_redirect');
      if (redirect) {
        sessionStorage.removeItem('spa_redirect');
        history.replaceState(null, null, redirect);
      }
    })();
  </script>
  <link rel="icon" type="image/png" href="assets/Auralicorizon.png">
</head>
<body class="mat-typography">
  <app-root></app-root>
</body>
</html>
